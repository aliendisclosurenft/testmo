<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM Ultra NFT Sniper Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f1a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: #161e2e; padding: 25px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: #1f2937; padding: 15px; border-radius: 8px; border-left: 4px solid #38bdf8; }
        label { display: block; font-size: 12px; margin: 8px 0 4px; color: #94a3b8; }
        input { width: 90%; padding: 10px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: #38bdf8; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: #38bdf8; color: #0f172a; }
        .btn-green { background: #22c55e; color: #fff; }
        .btn-red { background: #ef4444; color: #fff; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        #log { margin-top: 20px; background: #000; color: #4ade80; padding: 15px; border-radius: 6px; height: 180px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid #334155; }
        .wallet-box { background: #111; padding: 10px; font-size: 11px; max-height: 100px; overflow-y: auto; color: #94a3b8; margin-top: 10px; border: 1px dashed #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ EVM SNIPER DASHBOARD</h2>

    <div class="section" style="margin-bottom: 20px; border-left-color: #f59e0b;">
        <label>Alchemy RPC URL</label>
        <input type="text" id="rpcUrl" value="https://eth-mainnet.g.alchemy.com/v2/qsRB4lImGHF_FyQ-B-Xto">
        <label>Master Private Key (যেই ওয়ালেটে মেইন ফান্ড আছে)</label>
        <input type="password" id="masterKey" placeholder="Enter Private Key here">
    </div>

    <div class="grid">
        <div class="section">
            <h3>Step 1: Wallets</h3>
            <input type="number" id="walletCount" value="10" placeholder="Count">
            <button class="btn-blue" onclick="generateWallets()">Generate & Save Keys</button>
            <div id="walletDisplay" class="wallet-box">No wallets generated yet.</div>
        </div>

        <div class="section" style="border-left-color: #22c55e;">
            <h3>Step 2: Funding</h3>
            <label>Amount per Wallet (ETH/MATIC)</label>
            <input type="text" id="fundAmount" value="0.01">
            <button class="btn-green" onclick="distributeFunds()">Distribute Funds Now</button>
        </div>
    </div>

    <div class="section" style="margin-top: 20px; border-left-color: #ef4444;">
        <h3>Step 3: Attack Settings (Mint)</h3>
        <div class="grid">
            <div>
                <label>Contract Address</label>
                <input type="text" id="contractAddr" placeholder="0x...">
                <label>NFT Price</label>
                <input type="text" id="price" value="0.005">
            </div>
            <div>
                <label>Mint Time (YYYY-MM-DD HH:MM:SS)</label>
                <input type="text" id="mintTime" placeholder="2026-03-20 22:00:00">
                <button class="btn-red" onclick="scheduleMint()">ARM SNIPER (AUTO-MINT)</button>
            </div>
        </div>
    </div>

    <div id="log">>> Dashboard Ready. Provide Keys and Target...</div>
</div>

<script>
    let wallets = [];

    function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function generateWallets() {
        const count = document.getElementById('walletCount').value;
        wallets = [];
        let exportText = "Address, Private Key\n";
        
        for (let i = 0; i < count; i++) {
            const wallet = ethers.Wallet.createRandom();
            wallets.push({ address: wallet.address, privateKey: wallet.privateKey });
            exportText += `${wallet.address}, ${wallet.privateKey} [Export Private Key]\n`;
        }
        
        document.getElementById('walletDisplay').innerText = `${count} Wallets Ready. File downloaded.`;
        log(`Generated ${count} child wallets.`);
        
        const blob = new Blob([exportText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'sniper_wallets.txt';
        a.click();
    }

    async function distributeFunds() {
        const rpc = document.getElementById('rpcUrl').value;
        const masterKey = document.getElementById('masterKey').value;
        const amount = document.getElementById('fundAmount').value;

        if(!masterKey || wallets.length === 0) return alert("Generate wallets and provide Master Key first!");

        const provider = new ethers.providers.JsonRpcProvider(rpc);
        const masterWallet = new ethers.Wallet(masterKey, provider);

        log(`Starting distribution of ${amount} per wallet...`);

        for(let w of wallets) {
            try {
                const tx = await masterWallet.sendTransaction({
                    to: w.address,
                    value: ethers.utils.parseEther(amount)
                });
                log(`Sent to ${w.address.substring(0,8)}... | Tx: ${tx.hash.substring(0,10)}`);
            } catch (err) {
                log(`Failed to send to ${w.address}: ${err.message}`);
            }
        }
        log("✅ Funding Complete!");
    }

    async function scheduleMint() {
        const rpc = document.getElementById('rpcUrl').value;
        const targetTimeStr = document.getElementById('mintTime').value;
        const contractAddr = document.getElementById('contractAddr').value;
        const price = document.getElementById('price').value;

        if(!targetTimeStr || !contractAddr) return alert("Fill Mint Settings!");

        const provider = new ethers.providers.JsonRpcProvider(rpc);
        const targetTime = new Date(targetTimeStr).getTime();

        log(`Sniper ARMED. Waiting for ${targetTimeStr}...`);

        const timer = setInterval(async () => {
            const now = Date.now();
            if (now >= targetTime) {
                clearInterval(timer);
                log("🚀 TARGET TIME! LAUNCHING MINT...");

                const abi = ["function mint(uint256 quantity) public payable"];
                const gasPrice = (await provider.getGasPrice()).mul(2); // 200% High Speed Gas

                wallets.forEach(async (w) => {
                    try {
                        const signer = new ethers.Wallet(w.privateKey, provider);
                        const contract = new ethers.Contract(contractAddr, abi, signer);
                        const tx = await contract.mint(1, {
                            value: ethers.utils.parseEther(price),
                            gasLimit: 250000,
                            gasPrice: gasPrice
                        });
                        log(`🔥 MINTED! Wallet: ${w.address.substring(0,6)} | Tx: ${tx.hash}`);
                    } catch (e) {
                        log(`❌ Failed: ${w.address.substring(0,6)}`);
                    }
                });
            }
        }, 50); // Checks every 50ms for ultra precision
    }
</script>

</body>
</html>
