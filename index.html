<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM Ultra Sniper v3.0 - Polygon Ready</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #0f172a; padding: 30px; border-radius: 12px; border: 1px solid #1e293b; box-shadow: 0 0 40px rgba(0,0,0,0.7); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: #1e293b; padding: 15px; border-radius: 8px; border-top: 4px solid #38bdf8; margin-bottom: 20px; }
        h2 { text-align: center; color: #8247e5; text-transform: uppercase; letter-spacing: 2px; } /* Polygon Purple */
        label { display: block; font-size: 11px; margin: 8px 0; color: #94a3b8; font-weight: bold; }
        input, textarea { width: 92%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #020617; color: #38bdf8; outline: none; }
        textarea { height: 80px; font-size: 10px; font-family: monospace; }
        button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-gen { background: #38bdf8; color: #020617; }
        .btn-fund { background: #22c55e; color: #fff; }
        .btn-attack { background: #ef4444; color: #fff; font-size: 16px; border: 2px solid white; }
        #log { margin-top: 20px; background: #000; color: #4ade80; padding: 15px; border-radius: 6px; height: 250px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; border: 1px solid #334155; }
        .badge { background: #8247e5; padding: 4px 10px; border-radius: 20px; font-size: 10px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ EVM SNIPER v3.0 <span class="badge">POLYGON OPTIMIZED</span></h2>

    <div class="section">
        <label>RPC URL (পলিগনের জন্য QuickNode/Alchemy ব্যবহার করুন)</label>
        <input type="text" id="rpcUrl" value="https://polygon-mainnet.g.alchemy.com/v2/your-api-key" placeholder="Enter RPC URL">
        <label>Master Private Key (যেখান থেকে ফি পাঠাবেন)</label>
        <input type="password" id="masterKey" placeholder="0x...">
    </div>

    <div class="grid">
        <div class="section">
            <h3>1. Wallets Management</h3>
            <button class="btn-gen" onclick="generateWallets()">Generate New Wallets</button>
            <label>OR Import Private Keys (One per line)</label>
            <textarea id="importKeys" placeholder="0xabc...&#10;0xdef..."></textarea>
            <button class="btn-gen" style="background: #64748b;" onclick="importWallets()">Load Imported Wallets</button>
        </div>

        <div class="section" style="border-top-color: #22c55e;">
            <h3>2. Bulk Funding</h3>
            <label>Amount (MATIC per wallet)</label>
            <input type="text" id="fundAmount" value="0.5">
            <button class="btn-fund" onclick="distributeFunds()">Distribute MATIC Now</button>
        </div>
    </div>

    <div class="section" style="border-top-color: #ef4444;">
        <h3>3. Sniper (Target Settings)</h3>
        <div class="grid">
            <div>
                <label>NFT Contract Address</label>
                <input type="text" id="contractAddr" placeholder="0x...">
                <label>Price (0 for Free)</label>
                <input type="text" id="price" value="0">
            </div>
            <div>
                <label>Time (YYYY-MM-DD HH:MM:SS)</label>
                <input type="text" id="mintTime" placeholder="2026-03-20 21:55:00">
                <button class="btn-attack" onclick="scheduleMint()">🔥 START ATTACK</button>
            </div>
        </div>
    </div>

    <div id="log">>> Ready for Action...</div>
</div>

<script>
    let wallets = [];
    let provider;

    function log(msg, color = "#4ade80") {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function getProvider() {
        const rpc = document.getElementById('rpcUrl').value;
        return new ethers.providers.JsonRpcProvider(rpc);
    }

    async function generateWallets() {
        const count = prompt("How many wallets?", "5");
        wallets = [];
        let exportText = "";
        for (let i = 0; i < count; i++) {
            const w = ethers.Wallet.createRandom();
            wallets.push(w.privateKey);
            exportText += w.privateKey + "\n";
        }
        document.getElementById('importKeys').value = exportText;
        log(`Generated ${count} new wallets.`);
    }

    function importWallets() {
        const lines = document.getElementById('importKeys').value.split('\n');
        wallets = lines.map(l => l.trim()).filter(l => l.length > 10);
        log(`Loaded ${wallets.length} wallets successfully.`);
    }

    async function distributeFunds() {
        const masterKey = document.getElementById('masterKey').value;
        const amount = document.getElementById('fundAmount').value;
        const p = getProvider();
        
        if(!masterKey || wallets.length === 0) return alert("Keys or Wallets missing!");
        
        const masterWallet = new ethers.Wallet(masterKey, p);
        log("🚀 Starting Bulk Funding on Polygon...");

        for(let key of wallets) {
            try {
                const tempWallet = new ethers.Wallet(key);
                const tx = await masterWallet.sendTransaction({
                    to: tempWallet.address,
                    value: ethers.utils.parseEther(amount)
                });
                log(`Funded ${tempWallet.address.substring(0,8)} | Tx: ${tx.hash.substring(0,10)}`);
                await tx.wait(); // Wait for confirmation on Polygon
            } catch (e) { log(`Error: ${e.message}`, "#ef4444"); }
        }
        log("✅ Distribution Finished!");
    }

    async function scheduleMint() {
        const targetTimeStr = document.getElementById('mintTime').value;
        const contractAddr = document.getElementById('contractAddr').value;
        const price = document.getElementById('price').value;
        const targetTime = new Date(targetTimeStr).getTime();
        const p = getProvider();

        log(`Sniper Armed. Target: ${targetTimeStr}`, "#f59e0b");

        const sniper = setInterval(async () => {
            if (Date.now() >= targetTime) {
                clearInterval(sniper);
                log("🔥 ATTACKING NOW!", "#ef4444");

                // Polygon Gas Optimization (EIP-1559)
                const feeData = await p.getFeeData();
                // ২০% বাড়তি ফি যাতে অন্যদের আগে ট্রানজেকশন যায়
                const maxFee = feeData.maxFeePerGas.mul(120).div(100); 
                const priorityFee = feeData.maxPriorityFeePerGas.mul(150).div(100); 

                const abi = ["function mint(uint256 quantity) public payable", "function claim(uint256 amount) public payable"];

                wallets.forEach(async (key) => {
                    try {
                        const signer = new ethers.Wallet(key, p);
                        const contract = new ethers.Contract(contractAddr, abi, signer);
                        const val = (parseFloat(price) > 0) ? ethers.utils.parseEther(price) : 0;

                        const tx = await contract.mint(1, {
                            value: val,
                            maxFeePerGas: maxFee,
                            maxPriorityFeePerGas: priorityFee,
                            gasLimit: 250000
                        });
                        log(`✅ SUCCESS! Tx: ${tx.hash}`);
                    } catch (e) {
                        log(`❌ Failed: ${e.message.substring(0,50)}...`, "#ef4444");
                    }
                });
            }
        }, 50);
    }
</script>
</body>
</html>
